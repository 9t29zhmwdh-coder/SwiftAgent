name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Build
        run: swift build
      - name: Test
        run: swift test --enable-code-coverage
      - name: Coverage summary
        run: |
          BIN_PATH=$(swift build --show-bin-path)
          XCTEST_PATH=$(find "$BIN_PATH" -name '*.xctest' | head -n 1)
          BINARY="$XCTEST_PATH/Contents/MacOS/$(basename "$XCTEST_PATH" .xctest)"
          xcrun llvm-cov report "$BINARY" \
            -instr-profile="$BIN_PATH/codecov/default.profdata" \
            -ignore-filename-regex=".build|Tests"
